<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:#000;
}

/* Animated Background */

body::before{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(255,215,0,.18),transparent 25%),
radial-gradient(circle at 80% 80%,rgba(255,215,0,.15),transparent 25%),
linear-gradient(135deg,#000,#111,#000);
animation:bgMove 8s ease infinite;
}

@keyframes bgMove{
0%,100%{filter:brightness(1);}
50%{filter:brightness(1.15);}
}

/* Floating Stars */

.star{
position:absolute;
width:3px;
height:3px;
background:gold;
border-radius:50%;
box-shadow:0 0 8px gold;
animation:float linear infinite;
}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:0;
}

10%{
opacity:1;
}

100%{
transform:translateY(-120px);
opacity:0;
}

}

.login{

position:relative;
z-index:10;

width:390px;
max-width:90%;

padding:45px;

background:rgba(18,18,18,.92);

border:2px solid rgba(255,215,0,.5);

border-radius:25px;

backdrop-filter:blur(12px);

text-align:center;

box-shadow:
0 0 20px rgba(255,215,0,.25),
0 0 50px rgba(255,215,0,.12);

transition:.6s;

}

/* Lock */

.lock{

font-size:60px;

margin-bottom:10px;

animation:pulse 2s infinite;

}

@keyframes pulse{

0%,100%{
transform:scale(1);
}

50%{
transform:scale(1.12);
}

}

/* Heart */

.heart{

font-size:70px;

animation:heartBeat 1.4s infinite;

filter:drop-shadow(0 0 12px crimson);

}

@keyframes heartBeat{

0%,100%{
transform:scale(1);
}

50%{
transform:scale(1.15);
}

}

h1{

color:gold;

margin:15px 0;

font-size:32px;

}

p{

color:white;

line-height:1.8;

}

input{

width:100%;

margin-top:30px;

padding:15px;

border:none;

outline:none;

border-radius:12px;

font-size:17px;

text-align:center;

}

button{

width:100%;

margin-top:18px;

padding:15px;

border:none;

border-radius:12px;

background:linear-gradient(90deg,#FFD700,#ffef99);

font-size:17px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:translateY(-3px);

box-shadow:0 0 20px gold;

}

.error{

margin-top:18px;

padding:12px;

border-radius:10px;

background:rgba(255,215,0,.08);

color:#FFD700;

opacity:0;

transform:translateY(10px);

transition:.4s;

}

.error.show{

opacity:1;

transform:translateY(0);

}

.shake{

animation:shake .45s;

}

@keyframes shake{

0%{transform:translateX(0);}
20%{transform:translateX(-8px);}
40%{transform:translateX(8px);}
60%{transform:translateX(-6px);}
80%{transform:translateX(6px);}
100%{transform:translateX(0);}

}

.unlock{

animation:unlock .8s forwards;

}

@keyframes unlock{

0%{
transform:scale(1);
opacity:1;
}

100%{
transform:scale(.85);
opacity:0;
}

}

.footer{

margin-top:28px;

font-size:13px;

color:#888;

}
/* ========================= */
/* Page Management */
/* ========================= */

.page{
display:none;
position:absolute;
top:0;
left:0;
width:100%;
height:100vh;
justify-content:center;
align-items:center;
animation:fadeIn .8s ease;
}

.page.active{
display:flex;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(25px);
}

to{
opacity:1;
transform:translateY(0);
}

}

  /* ========================= */
/* PAGE 2 - Welcome Card */
/* ========================= */

.welcome-card{

position:relative;
z-index:10;

width:700px;
max-width:90%;

padding:50px;

background:rgba(18,18,18,.92);

border:2px solid rgba(255,215,0,.5);

border-radius:25px;

backdrop-filter:blur(12px);

text-align:center;

box-shadow:
0 0 20px rgba(255,215,0,.25),
0 0 50px rgba(255,215,0,.12);

}

.welcome-card h1{

color:#FFD700;

font-size:42px;

line-height:1.5;

margin-bottom:25px;

min-height:120px;

}

.welcome-card p{

color:white;

font-size:20px;

line-height:1.8;

min-height:150px;

}

.welcome-card button{

margin-top:35px;

width:auto;

padding:15px 35px;

border:none;

border-radius:50px;

background:linear-gradient(90deg,#FFD700,#FFF2A0);

color:black;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

.welcome-card button:hover{

transform:scale(1.05);

box-shadow:0 0 20px gold;

}

</style>

</head>

<body>

<script>

for(let i=0;i<80;i++){

const star=document.createElement("div");

star.className="star";

star.style.left=Math.random()*100+"vw";

star.style.animationDuration=(5+Math.random()*8)+"s";

star.style.animationDelay=Math.random()*8+"s";

document.body.appendChild(star);

}

</script>

<section id="page1" class="page active">

<div class="login" id="loginCard">

<div class="lock" id="lock">
🔒
</div>

<div class="heart">
❤️
</div>

<h1>Birthday Surprise</h1>

<p>

Enter the secret password to continue ❤️

</p>

<input
type="password"
id="password"
placeholder="Enter Password">

<button onclick="login()">

Unlock My Surprise ✨

</button>

<div id="error" class="error"></div>

<div class="footer">

Made with ❤️ by Santhosh

</div>

</div>

</section>
  
<!-- ================= PAGE 2 ================= -->

<section id="page2" class="page">

<div class="welcome-card">

<h1 id="typingTitle"></h1>

<p id="typingText"></p>

<button onclick="gotoPage3()">

✨ Please Click Here! ✨

</button>

</div>

</section>
<script>

function login(){

const pass=document.getElementById("password").value;

const error=document.getElementById("error");

const card=document.getElementById("loginCard");

const lock=document.getElementById("lock");

if(pass==="23052026"){

lock.innerHTML="🔓";

lock.style.transform="scale(1.2)";

lock.style.transition=".5s";

setTimeout(()=>{

card.classList.add("unlock");

},500);

setTimeout(()=>{

document.getElementById("page1").classList.remove("active");
document.getElementById("page2").classList.add("active");

showWelcome();

},1300);

}

else{

error.innerHTML="💖 Hmm... Try the special date that means something to us. ❤️";

error.classList.add("show");

card.classList.add("shake");

setTimeout(()=>{

card.classList.remove("shake");

},500);

setTimeout(()=>{

error.classList.remove("show");

},3000);

document.getElementById("password").value="";

document.getElementById("password").focus();

}

}
function showWelcome(){

document.getElementById("typingTitle").innerHTML =
"A cutiepie was born on this day,<br>26 years ago ❤️🎉";

document.getElementById("typingText").innerHTML =
"Today isn't just another day...<br><br>It's the day someone incredibly beautiful came into this world. ❤️";

}
</script>

</body>
</html>
