<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Birthday Surprise</title><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script></head><body><div class="page active" id="login"><h2>Enter the secret password to continue ❤️</h2><input id="pwd" type="password"><button onclick="checkPassword()">Unlock</button><p id="err"></p></div><div class="page" id="welcome"><h1>A cutiepie was born on this day, 26 years ago. ❤️🎉</h1><button onclick="showPage('balloons')">Please Click Here!</button></div><div class="page" id="balloons"><h2>Pop all balloons!</h2><div class="balloons"><div class="balloon" onclick="pop(this,'HAPPY')"></div><div class="balloon" onclick="pop(this,'BIRTHDAY')"></div><div class="balloon" onclick="pop(this,'Passenger Princess 💕')"></div></div><button id="next1" disabled onclick="showPage('message')">Next</button></div><div class="page" id="message"><div class="card"><h2>MESSAGE</h2><p>Happy Birthday! This message is a placeholder until you give me the final letter.</p><button onclick="showPage('gift')">Next</button></div></div><div class="page" id="gift"><div id="giftbox">🎁</div><h2>One Last Thing...</h2><button onclick="openGift()">Tap Here</button></div><div class="page" id="gallery"><h2>Gallery</h2><div class="gallery"><img src="https://placehold.co/250x350?text=Photo+1"><img src="https://placehold.co/250x350?text=Photo+2"><img src="https://placehold.co/250x350?text=Photo+3"><img src="https://placehold.co/250x350?text=Photo+4"><img src="https://placehold.co/250x350?text=Photo+5"></div></div><script src="script.js"></script></body></html>
